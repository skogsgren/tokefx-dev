[dir]
ud_base="$MIMER_DIR/tokefx-dev/data/UD_PUD/"
belebele_base="$MIMER_DIR/tokefx-dev/data/belebele/"
out="$MIMER_DIR/tokefx-dev/out/qwen"

[lang]

[lang.english]
iso639="eng_Latn"
pud-conllu="UD_English-PUD/en_pud-ud-test.conllu"

[lang.turkish]
iso639="tur_Latn"
pud-conllu="UD_Turkish-PUD/tr_pud-ud-test.conllu"

[lang.chinese]
iso639="zho_Hans"
pud-conllu="UD_Chinese-PUD/zh_pud-ud-test.conllu"

[lang.japanese]
iso639="jpn_Jpan"
pud-conllu="UD_Japanese-PUD/ja_pud-ud-test.conllu"

[eval]
models=[ # (model, tokenizer) tuples
    ["Qwen/Qwen3-0.6B", "Qwen/Qwen3-0.6B"],
    ["Qwen/Qwen3-1.7B", "Qwen/Qwen3-1.7B"],
    ["Qwen/Qwen3-4B", "Qwen/Qwen3-4B"],
    ["Qwen/Qwen3-8B", "Qwen/Qwen3-8B"],
]
analyses=[
    "boundary",
    "compound",
]
ignored_pos=[
    "PROPN", # proper nouns (since they're probably identical between some languages)
    "PUNCT", # punctuation
    "PART", # particles
    "SYM", # symbols
    "NUM", # numbers
    "X", # foreign words
]
device="cuda"
add_special_tokens=false
n_rows=150
context_window=4096
source_aggregation="mean"
